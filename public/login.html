<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FileCloud — Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/png" href="images/icons/favicon.ico"/>
<link rel="stylesheet" type="text/css" href="vendor/bootstrap/css/bootstrap.min.css">
<link rel="stylesheet" type="text/css" href="fonts/font-awesome-4.7.0/css/font-awesome.min.css">
<link rel="stylesheet" type="text/css" href="fonts/Linearicons-Free-v1.0.0/icon-font.min.css">
<link rel="stylesheet" type="text/css" href="vendor/animate/animate.css">
<link rel="stylesheet" type="text/css" href="vendor/css-hamburgers/hamburgers.min.css">
<link rel="stylesheet" type="text/css" href="vendor/animsition/css/animsition.min.css">
<link rel="stylesheet" type="text/css" href="vendor/select2/select2.min.css">
<link rel="stylesheet" type="text/css" href="vendor/daterangepicker/daterangepicker.css">
<link rel="stylesheet" type="text/css" href="css/util.css">
<link rel="stylesheet" type="text/css" href="css/main.css">
</head>
<body>
<div class="limiter">
  <div class="container-login100" style="background-image: url('images/bg-01.jpg');">
    <div class="wrap-login100 p-t-30 p-b-50">
      <span class="login100-form-title p-b-41">
        ☁️ FileCloud Login
      </span>

      <!-- VULN V1: Session Fixation demo hint -->
      <!-- An attacker can pre-set the session ID via ?sid=KNOWN_VALUE -->
      <!-- e.g. http://localhost:3000/login.html?sid=attacker123 -->
      <!-- After victim logs in, attacker uses connect.sid=s%3Aattacker123.xxx -->

      <form class="login100-form validate-form p-b-33 p-t-5" action="/login" method="post">
        <div class="wrap-input100 validate-input" data-validate="Enter username">
          <input class="input100" type="text" name="username" placeholder="Username" required>
          <span class="focus-input100" data-placeholder="&#xe82a;"></span>
        </div>
        <div class="wrap-input100 validate-input" data-validate="Enter password">
          <input class="input100" type="password" name="password" placeholder="Password" required>
          <span class="focus-input100" data-placeholder="&#xe80f;"></span>
        </div>
        <div class="container-login100-form-btn m-t-32">
          <button class="login100-form-btn">Login</button>
        </div>
      </form>

      <div class="text-center mt-3">
        <a href="/signup.html" class="btn btn-secondary">Create Account</a>
      </div>

      <!-- Demo credentials hint (intentional — default credentials vuln) -->
      <div class="text-center mt-3" style="font-size:12px;color:#888;">
        Demo: alice/alice &nbsp;|&nbsp; bob/bob &nbsp;|&nbsp; admin/admin
      </div>
    </div>
  </div>
</div>

<script src="vendor/jquery/jquery-3.2.1.min.js"></script>
<script src="vendor/animsition/js/animsition.min.js"></script>
<script src="vendor/bootstrap/js/popper.js"></script>
<script src="vendor/bootstrap/js/bootstrap.min.js"></script>
<script src="vendor/select2/select2.min.js"></script>
<script src="vendor/daterangepicker/moment.min.js"></script>
<script src="vendor/daterangepicker/daterangepicker.js"></script>
<script src="vendor/countdowntime/countdowntime.js"></script>
<script src="js/main.js"></script>
</body>
</html>
